  A cozy pixel RPG that is lying to you.
  Gull Harbor, Maine. January 1, 2000. Population 312.

  MODDING GUIDE (for continued development):
  - MAPS: string grids + a legend. Add rooms by adding entries
    to MAPS, portals in map.portals, objects in map.objects.
  - NPCS: add to map.npcs with a sprite key and a script().
    script(F) receives the flags object and returns a dialogue id.
  - DIALOGUE: DIALOGUES[id] is an array of nodes:
      {who, text}                     a spoken line (text can be a fn)
      {choices:[{label, next}]}       branch; next = dialogue id
      {set:{flag: value}}             set story flags
      {fn: "name"}                    run a hook from FNS (battles, items)
      {goto: "id"}                    jump to another dialogue
  - BATTLES: see BATTLES.gull for the template (acts, patterns, lines).
  - SOULS: the player picks a soul in the creator. Add shapes to the
    SOULS array (a string grid + palette overrides) and they appear
    everywhere the soul is drawn (battle, creator, game over).
  - NPCs may declare when(F) => bool to appear conditionally (see THE
    KEEPER). Battles may declare channel: "CH XX" for the box readout.
  - FLAGS drive everything. Repeat conversations, hidden content,
    and consequences all read game.flags.
  ============================================================

<style>
  :root {
    --ink: #f4f2ec;
    --void: #0a0a0f;
    --box: #000;
    --accent: #e8703a;     /* buoy orange */
    --spare: #ffe86b;
    --glitchA: #ff3df0;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--void); overflow: hidden; }

    display: flex; align-items: center; justify-content: center;

    display: block;

  /* ---------- dialogue box ---------- */
  #dbox {
    position: absolute; left: 4%; right: 4%; bottom: 4%;

    border: 4px solid var(--ink);

    font-size: 20px; line-height: 1.5;

  #dwho { color: var(--accent); font-weight: bold; margin-bottom: 4px; font-size: 15px; letter-spacing: 0.12em; }
  #dtext .g { color: var(--glitchB); text-shadow: 2px 0 var(--glitchA); }
  #dtext .y { color: var(--spare); }
  #dmore { position: absolute; right: 14px; bottom: 8px; animation: bob 0.6s infinite alternate; }

  #dchoices { margin-top: 8px; }
  .choice { padding: 2px 0 2px 28px; position: relative; color: #bdbbb2; }
  .choice.sel { color: var(--ink); }
  .choice.sel::before { content: "›"; color: #ffd23f; position: absolute; left: 6px; font-size: 18px; }

  /* ---------- battle UI ---------- */
  #bwrap { position: absolute; inset: 0; display: none; z-index: 15; }
  #bstats {
    position: absolute; left: 4%; bottom: 13%;

  #bmenu {

  .bbtn {

/* deterministic hash for ground dither */
const hash2 = (x, y) => {
  let h = (x * 374761393 + y * 668265263) ^ 0x5bf03635;
  h = (h ^ (h >> 13)) * 1274126177;
  return ((h ^ (h >> 16)) >>> 0) / 4294967295;
};

/* fit canvas to window, integer-ish scale */
function fit() {
  const s = Math.min(innerWidth / cv.width, innerHeight / cv.height) * 0.97;
  cv.style.width = cv.width * s + "px";
  cv.style.height = cv.height * s + "px";
}
addEventListener("resize", fit); fit();

/* ================= audio (tiny bleep synth) ================= */
let AC = null, sndOn = true;
function ac() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; }
function beep(freq, dur = 0.05, type = "square", vol = 0.04) {
  if (!sndOn) return;
  try {
    const a = ac(), o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    o.connect(g).connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  } catch (e) {}
}
const SFX = {
  text: p => beep(300 + p * 140, 0.04),
  move: () => beep(660, 0.03, "square", 0.02),
  sel: () => beep(880, 0.07),
  hurt: () => beep(120, 0.15, "sawtooth", 0.06),

/* draw a string-grid sprite. overrides maps chars to colors. */
function drawSprite(c, grid, x, y, px, overrides = {}, flip = false) {
  for (let r = 0; r < grid.length; r++) {
    const row = grid[r];
    for (let i = 0; i < row.length; i++) {
      const ch = row[flip ? row.length - 1 - i : i];
      if (ch === ".") continue;
      const col = overrides[ch] || PAL[ch] || "#f0f";
      c.fillStyle = col;
      c.fillRect(x + i * px, y + r * px, px, px);
    }
  }
}

/* composite the player from options */
function drawPlayer(c, x, y, px, facing, opts, bob = 0) {
  const flip = facing === "left";
  const key = (facing === "left" || facing === "right") ? "side" : facing;
  const ov = { S: SKINS[opts.skin], T: SHIRTS[opts.shirt][1] };
  drawSprite(c, BODY[key], x, y + bob * px, px, ov, flip);
  const hair = HAIR[HAIRSTYLES[opts.hair]][key];
  drawSprite(c, hair, x, y + bob * px, px, { H: HAIRCOLS[opts.hcol][1] }, flip);
}

function drawSoul(c, x, y, alpha = 1, s = 2) {
  const soul = SOULS[game.opts.soul] || SOULS[0];
  c.save();
  c.globalAlpha = alpha;
  if (!soul.grid) { /* the pixel: small, white, breathing */
    const pulse = 1 + Math.sin(game.t / 260) * 0.25;
    const half = 3 * pulse;
    c.fillStyle = "rgba(244,242,236,0.25)";
    c.fillRect(x - half - 3, y - half - 3, half * 2 + 6, half * 2 + 6);
    c.fillStyle = "#f4f2ec";
    c.fillRect(x - half, y - half, half * 2, half * 2);
    c.restore();
    return;
  }
  const g = soul.grid, w = g[0].length * s, h = g.length * s;
  drawSprite(c, g, x - w / 2, y - h / 2, s, soul.col);
  c.restore();
}

/* storage that survives hosting but degrades gracefully in previews */
const store = {
  ok: (() => { try { localStorage.setItem("_lt", "1"); localStorage.removeItem("_lt"); return true; } catch (e) { return false; } })(),
  mem: {},
  get(k) { try { return this.ok ? localStorage.getItem(k) : this.mem[k]; } catch (e) { return this.mem[k]; } },
  set(k, v) { try { if (this.ok) localStorage.setItem(k, v); else this.mem[k] = v; } catch (e) { this.mem[k] = v; } }
};
function saveGame() {
  store.set("lowtide_save", JSON.stringify({
    map: game.map, px: game.px, py: game.py, name: game.name, almost: game.almost,
    opts: game.opts, hp: game.hp, inv: game.inv, flags: game.flags
  }));
  toast(store.ok ? "› Progress saved." : "› Saved (this session only).");
}
function loadGame() {
  const raw = store.get("lowtide_save");
  if (!raw) return false;
  try { Object.assign(game, JSON.parse(raw)); return true; } catch (e) { return false; }
}

function toast(msg) {
  const t = $("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 1800);
}

/* ---- Earl's mutating story: one detail changes each telling ---- */
const EARL_VERSIONS = [
  ["'87", "a wall"], ["'86", "a door"], ["'85", "a window"]
];

/* ================= dialogue hooks ================= */
const FNS = {
  margeName() {
    startDialog(game.almost && game.almost !== game.name ? "marge_name_meta" : "marge_name_soul");
    return true;
  },
  giveCoffee() {
    game.inv.push({ name: "Coffee, black", heal: 10, note: "Fresh-adjacent. Restores 10 HP." });
    game.flags.gotCoffee = true;
    toast("› You got [Coffee, black].");
  },
  giveFry() {
    game.inv.push({ name: "Cold Fry", heal: 6, note: "A gift, technically. Restores 6 HP." });
    toast("› You got [Cold Fry].");
  },
  earl() {
    const n = game.flags.earlTold || 0;
    game.flags.earlTold = n + 1;
    if (n >= EARL_VERSIONS.length) {
      startDialog("_earl_final");
    } else {
      const [year, thing] = EARL_VERSIONS[n];
      DIALOGUES._earl_dyn = [
        say("EARL", `Ayuh. I ever tell you about the storm of ${year}?`),
        say("EARL", `Water stood up like ${thing} and LOOKED at us. Whole harbor, frozen, lookin' back.`),
        say("EARL", "Then it laid itself down, polite as a Sunday, and nobody ever spoke of it."),
        say("EARL", "...Nobody except me. Every day. To everyone.")
      ];
      startDialog("_earl_dyn");
    }
    return true;
  },
  cannerySign() {
    const n = game.flags.cannerySeen = (game.flags.cannerySeen || 0) + 1;
    const yrs = Math.max(0, 48 - n);
    DIALOGUES._cansign = [
      you("› OSPREY CANNERY."),
      { who: null, text: `› ${yrs} YEARS WITHOUT AN ACCIDENT.` },
      you(n >= 3 ? "› The number is lower every time you look. You are almost sure of it."
                 : "› The sign is freshly painted. It is always freshly painted.")
    ];
    startDialog("_cansign");
    return true;
  },
  startGull() { startBattle("gull"); return true; },
  startSam() { startBattle("sam"); return true; }
};

/* ================= tile rendering ================= */
const TILECOLS = {
  ".": ["#dfe6ea", "#d3dce2"],
  ",": ["#dfe6ea", "#b9c6b4"],
  "=": ["#8a6f4d", "#75603f"],
  "F": ["#5c4a38", "#4a3b2c"],
  "R": ["#b45a4a", "#9c4b3d"],
  "G": ["#6e7f8a", "#5d6c76"],
  "W": ["#e9e7e0", "#d4d1c6"],
  "~": ["#2e4756", "#3a5a6e"],
  "c": ["#7a5c3a", "#684e30"],
  "t": ["#7a5c3a", "#684e30"],
  "B": ["#5c4a38", "#8a6f4d"],
  "d": ["#3a2c1e", "#2c2117"],
  "x": ["#3a2c1e", "#2c2117"],
  "q": ["#dfe6ea", "#d3dce2"],
  "T": ["#dfe6ea", "#d3dce2"],
  "s": ["#dfe6ea", "#d3dce2"],
  "e": ["#dfe6ea", "#d3dce2"],
  "m": ["#dfe6ea", "#d3dce2"]
};

function drawTile(ch, sx, sy, tx, ty) {
  const cols = TILECOLS[ch] || TILECOLS["."];
  let col = cols[hash2(tx, ty) > 0.5 ? 1 : 0];
  if (ch === "~") { /* animated cold Atlantic shimmer */
    const ph = Math.sin(game.t / 600 + tx * 1.7 + ty * 2.3);
    col = ph > 0.55 ? "#43647a" : cols[hash2(tx, ty) > 0.5 ? 1 : 0];
  }
  ctx.fillStyle = col;
  ctx.fillRect(sx, sy, TILE, TILE);
  /* dither speckle */
  if (ch === "." || ch === ",") {
    if (hash2(tx * 3, ty * 7) > 0.82) {
      ctx.fillStyle = "#c3ccd2";
      ctx.fillRect(sx + 8 + (hash2(tx, ty * 5) * 12 | 0), sy + 8 + (hash2(tx * 5, ty) * 12 | 0), 4, 4);
    }
    if (ch === ",") { ctx.fillStyle = "#93a68e"; ctx.fillRect(sx + 12, sy + 14, 4, 8); ctx.fillRect(sx + 18, sy + 12, 4, 10); }
  }
  if (ch === "=") { ctx.fillStyle = "#5f4e33"; ctx.fillRect(sx, sy + TILE - 3, TILE, 2); }
  if (ch === "F") { ctx.fillStyle = "#3a2f24"; ctx.fillRect(sx + 6, sy + 4, 6, TILE - 8); ctx.fillRect(sx + 20, sy + 4, 6, TILE - 8); }
  if (ch === "R" || ch === "G" || ch === "W") { /* clapboard lines */
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    for (let yy = 6; yy < TILE; yy += 8) ctx.fillRect(sx, sy + yy, TILE, 2);
  }
  if (ch === "d" || ch === "x") {
    ctx.fillStyle = "#c9a15a"; ctx.fillRect(sx + 22, sy + 14, 4, 4); /* knob */
    if (ch === "x") { ctx.fillStyle = "#8a8a96"; ctx.fillRect(sx + 4, sy + 6, TILE - 8, 4); } /* boarded */
  }
  if (ch === "B") { /* bulletin board */
    ctx.fillStyle = "#c9bfa2"; ctx.fillRect(sx + 4, sy + 4, TILE - 8, TILE - 12);
    ctx.fillStyle = "#e04b3a"; ctx.fillRect(sx + 8, sy + 8, 6, 8);
    ctx.fillStyle = "#3a5a8a"; ctx.fillRect(sx + 18, sy + 7, 7, 10);
  }
  if (ch === "e") { /* a drift of pennies */
    ctx.fillStyle = "#c9a15a";
    ctx.fillRect(sx + 6, sy + 18, 5, 4); ctx.fillRect(sx + 14, sy + 22, 5, 4);
    ctx.fillRect(sx + 20, sy + 16, 5, 4); ctx.fillRect(sx + 11, sy + 12, 5, 4);
  }
  if (ch === "m") { /* a television that should not be watching */
    ctx.fillStyle = "#3a3a44"; ctx.fillRect(sx + 4, sy + 8, TILE - 8, TILE - 14);
    ctx.fillStyle = "#14141c"; ctx.fillRect(sx + 8, sy + 12, TILE - 16, TILE - 22);
  }
  if (ch === "T") { /* tide chart on a stake */
    ctx.fillStyle = "#6b5535"; ctx.fillRect(sx + 14, sy + 14, 4, TILE - 14);
    ctx.fillStyle = "#e9e7e0"; ctx.fillRect(sx + 4, sy + 4, TILE - 8, 16);
    ctx.fillStyle = "#3a5a8a"; ctx.fillRect(sx + 7, sy + 8, TILE - 14, 2);
    ctx.fillRect(sx + 7, sy + 13, TILE - 14, 2);
  }
  if (ch === "s") { /* wooden sign */
    ctx.fillStyle = "#6b5535"; ctx.fillRect(sx + 14, sy + 16, 4, TILE - 16);
    ctx.fillStyle = "#8a6f4d"; ctx.fillRect(sx + 4, sy + 4, TILE - 8, 14);
    ctx.fillStyle = "#4a3b2c";
    ctx.fillRect(sx + 7, sy + 8, TILE - 14, 2); ctx.fillRect(sx + 7, sy + 12, TILE - 14, 2);
  }
  if (ch === "q") { /* phone booth */
    ctx.fillStyle = "#8a2b2b"; ctx.fillRect(sx + 4, sy - 8, TILE - 8, TILE + 4);
    ctx.fillStyle = "#bcd7e2"; ctx.fillRect(sx + 8, sy - 4, TILE - 16, 16);
    ctx.fillStyle = "#dfe6ea"; ctx.fillRect(sx + 12, sy + 20, 8, 2);
  }
}

function mapAt(m, x, y) {
  const g = MAPS[m].grid;
  if (y < 0 || y >= g.length || x < 0 || x >= g[0].length) return "F";
  return g[y][x];
}
function isSolid(m, x, y) {
  const ch = mapAt(m, x, y);
  if (ch === "q") return true;
  if (SOLID.has(ch)) return true;
  return MAPS[m].npcs.some(n => (!n.when || n.when(game.flags)) && n.x === x && n.y === y);
}

/* camera */
function cam() {
  const g = MAPS[game.map].grid;
  const w = g[0].length, h = g.length;
  const px = game.px + (game.moving ? game.mx * game.prog : 0);
  const py = game.py + (game.moving ? game.my * game.prog : 0);
  return {
    x: clamp(px - VW / 2 + 0.5, 0, Math.max(0, w - VW)),
    y: clamp(py - VH / 2 + 0.5, 0, Math.max(0, h - VH))
  };
}

function renderWorld() {
  const m = MAPS[game.map], g = m.grid;
  const c = cam();
  ctx.fillStyle = m.interior ? "#101018" : "#1a2028";
  ctx.fillRect(0, 0, cv.width, cv.height);

  for (let ty = Math.floor(c.y); ty < Math.min(g.length, c.y + VH + 1); ty++) {
    for (let tx = Math.floor(c.x); tx < Math.min(g[0].length, c.x + VW + 1); tx++) {
      drawTile(g[ty][tx], (tx - c.x) * TILE, (ty - c.y) * TILE, tx, ty);
    }
  }

  /* phone ring indicator */
  if (game.map === "docks" && game.flags.battleDone && !game.flags.signalHeard) {
    const bx = (2 - c.x) * TILE, by = (2 - c.y) * TILE;
    ctx.fillStyle = "#ffe86b";
    ctx.font = "bold 22px monospace";
    const shake = Math.sin(game.t / 60) * 3;
    ctx.fillText("!", bx + 12 + shake, by - 14);
    if (game.t % 2400 < 30) SFX.ring();
  }

  /* the thing the gull became, if you went further than mercy */
  if (game.map === "docks" && game.flags.weirdGull) {
    const wx = (10 - c.x) * TILE, wy = (13 - c.y) * TILE;
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(wx + 14, wy + 8 + Math.sin(game.t / 500) * 2, 5, 5);
  }

  /* NPCs */
  for (const n of m.npcs) {
    if (n.when && !n.when(game.flags)) continue;
    const sp = SPRITES[n.sprite];
    const px = 2, w = sp[0].length * px, h = sp.length * px;
    drawSprite(ctx, sp, (n.x - c.x) * TILE + (TILE - w) / 2, (n.y - c.y) * TILE + TILE - h, px);
  }

  /* player (smooth step + bounce) */
  const fx = game.px + (game.moving ? game.mx * game.prog : 0);
  const fy = game.py + (game.moving ? game.my * game.prog : 0);
  const bob = game.moving && (Math.floor(game.bobT / 120) % 2 === 0) ? -1 : 0;
  drawPlayer(ctx, (fx - c.x) * TILE + 6, (fy - c.y) * TILE + TILE - 28 + 0, 2, game.facing, game.opts, bob);

  /* room label */
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, cv.width, 22);
  ctx.fillStyle = "#8a8a96";
  ctx.font = "12px monospace";
  ctx.fillText(m.label + "  ·  JANUARY 1, 2000", 8, 15);
}

/* ================= movement & interaction ================= */
const keys = {};
function tryMove(dx, dy, facing) {
  game.facing = facing;
  const nx = game.px + dx, ny = game.py + dy;
  if (isSolid(game.map, nx, ny)) return;
  game.moving = true; game.mx = dx; game.my = dy; game.prog = 0;
}

function finishStep() {
  game.px += game.mx; game.py += game.my;
  game.moving = false; game.prog = 0;

  const m = MAPS[game.map];
  const p = m.portals.find(p => p.x === game.px && p.y === game.py);
  if (p) {
    game.map = p.to; game.px = p.tx; game.py = p.ty;
    return;
  }
  if (m.trigger && m.trigger.cond(game.flags) &&
      m.trigger.tiles.some(([x, y]) => x === game.px && y === game.py)) {
    const d = typeof m.trigger.dialog === "function" ? m.trigger.dialog(game.flags) : m.trigger.dialog;
    startDialog(d);
  }
}

function facingTile() {
  const d = { down: [0, 1], up: [0, -1], left: [-1, 0], right: [1, 0] }[game.facing];
  return [game.px + d[0], game.py + d[1]];
}

function interact() {
  const [tx, ty] = facingTile();
  const m = MAPS[game.map];
  const npc = m.npcs.find(n => (!n.when || n.when(game.flags)) && n.x === tx && n.y === ty);
  if (npc) { const id = npc.script(game.flags); if (id) startDialog(id); return; }
  for (const o of m.objects || []) {
    const hit = o.zone
      ? (tx >= o.x1 && tx <= o.x2 && ty >= o.y1 && ty <= o.y2)
      : (o.x === tx && o.y === ty);
    if (hit) { const id = o.script(game.flags); if (id) startDialog(id); return; }
  }
}

/* ================= dialogue engine ================= */
const D = { queue: [], i: 0, typing: false, shown: "", full: "", choiceIdx: 0, inChoice: false, chars: 0 };

function startDialog(id) {
  const nodes = DIALOGUES[id];
  if (!nodes) { console.warn("missing dialogue:", id); return; }
  D.queue = nodes.slice(); D.i = 0;
  game.mode = "dialog"; /* ALWAYS — script hooks were stranding the box in world mode */
  $("dbox").style.display = "block";
  $("dbox").classList.remove("top");
  nextNode();
}
function endDialog() {
  $("dbox").style.display = "none";
  $("dchoices").innerHTML = "";
  if (game.mode === "dialog") game.mode = "world";
}
function nextNode() {
  $("dchoices").innerHTML = ""; D.inChoice = false;
  if (D.i >= D.queue.length) { endDialog(); return; }
  const n = D.queue[D.i++];

  if (n.set) { Object.assign(game.flags, n.set); nextNode(); return; }
  if (n.goto) { startDialog(n.goto); return; }
  if (n.fn) { const took = FNS[n.fn](); if (!took) nextNode(); return; }
  if (n.choices) { showChoices(n.choices); return; }

  D.full = typeof n.text === "function" ? n.text() : n.text;
  D.shown = ""; D.chars = 0; D.typing = true;
  $("dwho").textContent = n.who || "";
  $("dwho").style.display = n.who ? "block" : "none";
  $("dmore").style.display = "none";
  renderDText();
}
function renderDText() { $("dtext").innerHTML = D.shown; }
function advanceText(dt) {
  if (!D.typing) return;
  D.chars += dt * 0.045;
  while (D.chars >= 1 && D.shown.length < D.full.length) {
    D.chars -= 1;
    /* pass through whole tags instantly so <g> spans survive the typewriter */
    if (D.full[D.shown.length] === "<") {
      const close = D.full.indexOf(">", D.shown.length);
      D.shown = D.full.slice(0, close + 1);
    } else {
      D.shown = D.full.slice(0, D.shown.length + 1);
      const ch = D.shown[D.shown.length - 1];
      if (ch !== " ") SFX.text(($("dwho").textContent.length % 4));
    }
  }
  renderDText();
  if (D.shown.length >= D.full.length) { D.typing = false; $("dmore").style.display = "block"; }
}
function showChoices(choices) {
  D.inChoice = true; D.choiceIdx = 0; D.choiceList = choices;
  $("dmore").style.display = "none";
  $("dchoices").innerHTML = choices.map((c, i) =>
    `<div class="choice${i === 0 ? " sel" : ""}">${c.label}</div>`).join("");
}
function dialogKey(k) {
  if (D.inChoice) {
    const items = [...document.querySelectorAll(".choice")];
    if (k === "ArrowUp" || k === "ArrowDown" || k === "w" || k === "s") {
      D.choiceIdx = (D.choiceIdx + (k === "ArrowUp" || k === "w" ? -1 : 1) + items.length) % items.length;
      items.forEach((el, i) => el.classList.toggle("sel", i === D.choiceIdx));
      SFX.move();
    } else if (k === "z" || k === "Enter") {
      SFX.sel();
      startDialog(D.choiceList[D.choiceIdx].next);
    }
    return;
  }
  if (k === "z" || k === "Enter" || k === "x") {
    if (D.typing) { D.shown = D.full; D.typing = false; renderDText(); $("dmore").style.display = "block"; }
    else nextNode();
  }
}

/* ================= pause menu ================= */
const PM = { idx: 0, items: [] };
function openPause() {
  game.mode = "pause";
  PM.items = [
    { label: () => `${game.name} · HP ${game.hp}/${game.maxhp}`, act: null },
    { label: () => `Tote: ${game.inv.length ? game.inv.map(i => i.name).join(", ") : "empty"}`, act: null },
    { label: () => "Save", act: () => { saveGame(); } },
    { label: () => `Sound: ${sndOn ? "ON" : "OFF"}`, act: () => { sndOn = !sndOn; drawPause(); } },
    { label: () => "Quit to title", act: () => { closePause(); toTitle(); } },
    { label: () => "Resume", act: closePause }
  ];
  PM.idx = PM.items.findIndex(it => it.act); /* start on first actionable row */
  drawPause();
  $("pmenu").style.display = "block";
}
function drawPause() {
  $("pmenu").innerHTML = PM.items.map((it, i) =>
    `<div class="mi${i === PM.idx ? " sel" : ""}${it.act ? "" : "\" style=\"color:#66666f"}">${it.label()}</div>`).join("");
}
function closePause() { $("pmenu").style.display = "none"; if (game.mode === "pause") game.mode = "world"; }
function pauseKey(k) {
  if (k === "Escape" || k === "x") { closePause(); return; }
  if (k === "ArrowUp" || k === "w") { do { PM.idx = (PM.idx + PM.items.length - 1) % PM.items.length; } while (!PM.items[PM.idx].act); drawPause(); SFX.move(); }
  if (k === "ArrowDown" || k === "s") { do { PM.idx = (PM.idx + 1) % PM.items.length; } while (!PM.items[PM.idx].act); drawPause(); SFX.move(); }
  if (k === "z" || k === "Enter") { SFX.sel(); PM.items[PM.idx].act && PM.items[PM.idx].act(); }
}

}
function beginDodge() {
  $("dbox").style.display = "none"; $("dbox").classList.remove("top");
  B.phase = "dodge"; B.bullets = []; B.dodgeT = 4200 - Math.min(B.calm * 900, 1800);
  B.heart.x = BOX.x + BOX.w / 2; B.heart.y = BOX.y + BOX.h / 2; B.inv = 0;
}
function endDodge() {
  B.phase = "menu"; B.menuIdx = 0; drawBMenu();
  battleText(B.def.idleLine, "menu");
}

function battleKey(k) {
  /* advancing battle narration */
  if ($("dbox").style.display === "block" && !B.subItems.length && (k === "z" || k === "Enter")) {
    if (D.typing) { D.shown = D.full; D.typing = false; renderDText(); $("dmore").style.display = "block"; return; }
    const a = B.after; B.after = null;
    if (a === "menu") { $("dbox").style.display = "none"; $("dbox").classList.remove("top"); B.phase = "menu"; }
    else if (a === "enemyline") enemyTurn();
    else if (a === "dodge") beginDodge();
    else if (a === "win_spare") endBattle("spare");
    else if (a === "win_kill") endBattle("kill");
    else if (a === "win_weird") endBattle("weird");
    return;
  }
  /* submenu */
  if (B.subItems.length) {
    if (k === "ArrowUp" || k === "w") { B.subIdx = (B.subIdx + B.subItems.length - 1) % B.subItems.length; renderSub(); SFX.move(); }
    else if (k === "ArrowDown" || k === "s") { B.subIdx = (B.subIdx + 1) % B.subItems.length; renderSub(); SFX.move(); }
    else if (k === "x" || k === "Escape") { B.subItems = []; $("dbox").style.display = "none"; $("dbox").classList.remove("top"); }
    else if (k === "z" || k === "Enter") { SFX.sel(); const it = B.subItems[B.subIdx]; B.subItems = []; it.act(); }
    return;
  }
  /* main menu */
  if (B.phase === "menu") {
    if (k === "ArrowLeft" || k === "a") { B.menuIdx = (B.menuIdx + 3) % 4; drawBMenu(); SFX.move(); }
    else if (k === "ArrowRight" || k === "d") { B.menuIdx = (B.menuIdx + 1) % 4; drawBMenu(); SFX.move(); }
    else if (k === "z" || k === "Enter") { SFX.sel(); pickMenu(); }
  } else if (B.phase === "fightbar" && (k === "z" || k === "Enter")) {
    resolveFight();
  }
}

function pickMenu() {
  const a = ["fight", "act", "item", "mercy"][B.menuIdx];
  if (a === "fight") { B.phase = "fightbar"; B.bar.t = 0; B.bar.dir = 1; }
  if (a === "act") battleSub("act", B.def.acts());
  if (a === "item") battleSub("item", game.inv.length ? game.inv.map((it, idx) => ({
    label: it.name, act: () => {
      game.hp = Math.min(game.maxhp, game.hp + it.heal);
      game.inv.splice(idx, 1); updateBHP();
      playerActed(`› You use the ${it.name}. HP restored.\n${B.def.itemLine.slice(2)}`);
    }
  })) : [{ label: "(your tote is empty)", act: () => playerActed("› You rummage through nothing. Nothing rummages back.") }]);
  if (a === "mercy") battleSub("mercy", [
    { label: B.calm >= 2 ? "Let 'em be ✦" : "Let 'em be", act: () => {
        if (B.calm >= 2) { SFX.spare(); battleText(`› You let ${B.def.name} be.`, "win_spare"); }
        else playerActed(B.def.mercyRefuse);
      } },
    { label: "Skedaddle", act: () => playerActed(B.def.fleeLine) }
  ]);
}

function resolveFight() {
  const center = Math.abs(B.bar.t - 0.5) * 2; /* 0 = perfect timing */
  const dmg = Math.round(4 + (1 - center) * 6);
  B.hp -= dmg; B.flash = 300; SFX.hit();
  if (B.hp <= 0) battleText("› ...", "win_kill");
  else playerActed(`› You strike. ${dmg} damage.\n${B.def.hitLine.slice(2)}`);
}

/* dodge phase */
function updateDodge(dt) {
  B.dodgeT -= dt;
  const h = B.heart, sp = 0.17 * dt;
  if (keys["ArrowLeft"] || keys["a"]) h.x -= sp;
  if (keys["ArrowRight"] || keys["d"]) h.x += sp;
  if (keys["ArrowUp"] || keys["w"]) h.y -= sp;
  if (keys["ArrowDown"] || keys["s"]) h.y += sp;
  h.x = clamp(h.x, BOX.x + 8, BOX.x + BOX.w - 8);
  h.y = clamp(h.y, BOX.y + 8, BOX.y + BOX.h - 8);
  if (B.inv > 0) B.inv -= dt;

  const rate = B.calm >= 2 ? 0.006 : B.calm === 1 ? 0.009 : 0.013;
  if (Math.random() < rate * dt) {
    B.bullets.push({ x: BOX.x + 10 + Math.random() * (BOX.w - 20), y: BOX.y - 10, vx: 0, vy: 0.06 + Math.random() * 0.04, w: 6, h: 14, fry: true, ph: Math.random() * 6 });
  }
  if (B.turn >= 2 && Math.random() < rate * 0.6 * dt) {
    const fromLeft = Math.random() < 0.5;
    B.bullets.push({ x: fromLeft ? BOX.x - 8 : BOX.x + BOX.w + 8, y: BOX.y + 12 + Math.random() * (BOX.h - 24), vx: fromLeft ? 0.11 : -0.11, vy: 0, w: 7, h: 7, fry: false });
  }
  /* an aimed fry now and then keeps perfect dodging honest */
  if (Math.random() < 0.0035 * dt) {
    B.bullets.push({ x: B.heart.x + (Math.random() * 44 - 22), y: BOX.y - 10, vx: 0, vy: 0.085, w: 7, h: 14, fry: true, ph: Math.random() * 6 });
  }
  for (const b of B.bullets) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.fry) b.x += Math.sin(b.ph + b.y / 18) * 0.4;
    if (B.inv <= 0 && Math.abs(b.x - h.x) < (b.w + 6) / 2 && Math.abs(b.y - h.y) < (b.h + 6) / 2) {
      game.hp = Math.max(0, game.hp - B.def.atk);
      updateBHP(); SFX.hurt(); B.inv = 900;
      if (game.hp <= 0) { gameOver(); return; }
    }
  }
  B.bullets = B.bullets.filter(b => b.x > BOX.x - 20 && b.x < BOX.x + BOX.w + 20 && b.y < BOX.y + BOX.h + 20);
  if (B.dodgeT <= 0) endDodge();
}

function renderBattle(dt) {
  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, cv.width, cv.height);
  const px = 6, sp = SPRITES[B.def.sprite];
  const gx = cv.width / 2 - sp[0].length * px / 2, gy = 20 + Math.sin(game.t / 400) * 3;
  drawSprite(ctx, sp, gx, gy, px);
  for (let i = 0; i < 7; i++) {
    if (Math.random() < 0.6) {
      ctx.fillStyle = Math.random() < 0.5 ? "#ff3df0" : "#3dfff0";
      ctx.fillRect(gx + rnd(sp[0].length) * px, gy + rnd(sp.length) * px, px, px);
    }
  }
  if (B.flash > 0) { B.flash -= dt; ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fillRect(gx - 10, gy - 10, sp[0].length * px + 20, sp.length * px + 20); }
  ctx.fillStyle = "#f4f2ec"; ctx.font = "13px monospace";
  ctx.fillText(B.def.name + (B.calm >= 2 ? "  \u2726" : ""), gx, gy - 12);
  ctx.fillStyle = "#5a0f0f"; ctx.fillRect(gx, gy - 8, 96, 5);
  ctx.fillStyle = B.calm >= 2 ? "#ffe86b" : "#4bc24b"; ctx.fillRect(gx, gy - 8, 96 * Math.max(0, B.hp) / B.def.maxhp, 5);
  ctx.strokeStyle = "#f4f2ec"; ctx.lineWidth = 4;
  ctx.strokeRect(BOX.x, BOX.y, BOX.w, BOX.h);
  /* the box is a set: phosphor tint, scanlines, channel readout */
  ctx.fillStyle = "rgba(61,255,240,0.05)";
  ctx.fillRect(BOX.x + 2, BOX.y + 2, BOX.w - 4, BOX.h - 4);
  ctx.fillStyle = "rgba(0,0,0,0.20)";
  for (let sl = BOX.y + 5; sl < BOX.y + BOX.h - 3; sl += 4) ctx.fillRect(BOX.x + 2, sl, BOX.w - 4, 1);
  ctx.font = "10px monospace"; ctx.fillStyle = "rgba(61,255,240,0.7)";
  ctx.fillText(B.def.channel || "CH 00", BOX.x + BOX.w - 46, BOX.y + 13);
  if (Math.random() < 0.02) { /* tracking wobble */
    ctx.fillStyle = "rgba(244,242,236,0.06)";
    ctx.fillRect(BOX.x + 2, BOX.y + 4 + Math.random() * (BOX.h - 10), BOX.w - 4, 2);
  }

  if (B.phase === "dodge") {
    updateDodge(dt);
    for (const b of B.bullets) {
      ctx.fillStyle = b.fry ? (B.def.fryCol || "#e8b93d") : (Math.random() < 0.5 ? "#ff3df0" : "#3dfff0");
      ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
    }
    const h = B.heart;
    const flick = B.inv > 0 && Math.floor(game.t / 80) % 2 === 0;
    drawSoul(ctx, h.x, h.y, flick ? 0.3 : 1);
  }
  if (B.phase === "fightbar") {
    B.bar.t += B.bar.dir * dt / 900;
    if (B.bar.t > 1) { B.bar.t = 1; B.bar.dir = -1; }
    if (B.bar.t < 0) { B.bar.t = 0; B.bar.dir = 1; }
    ctx.fillStyle = "#111"; ctx.fillRect(BOX.x + 8, BOX.y + BOX.h / 2 - 20, BOX.w - 16, 40);
    ctx.fillStyle = "#2a5a2a"; ctx.fillRect(BOX.x + BOX.w / 2 - 14, BOX.y + BOX.h / 2 - 20, 28, 40);
    ctx.fillStyle = "#f4f2ec";
    ctx.fillRect(BOX.x + 8 + B.bar.t * (BOX.w - 22), BOX.y + BOX.h / 2 - 24, 6, 48);
    ctx.font = "12px monospace"; ctx.fillStyle = "#8a8a96";
    ctx.fillText("press Z", BOX.x + BOX.w / 2 - 24, BOX.y + BOX.h - 10);
  }
}

/* ================= game over ================= */
function gameOver() {
  B.on = false; B.bullets = [];
  $("bwrap").style.display = "none";
  $("dbox").style.display = "none"; $("dbox").classList.remove("top");
  game.mode = "gameover"; game.overT = 0;
  SFX.hurt();
}
function renderGameOver(dt) {
  game.overT = (game.overT || 0) + dt;
  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, cv.width, cv.height);
  const sep = Math.min(34, game.overT / 40);
  const x = cv.width / 2, y = 160;
  /* the chosen soul, split down the middle, drifting apart */
  ctx.save(); ctx.beginPath(); ctx.rect(x - 60 - sep, y - 30, 60, 60); ctx.clip();
  drawSoul(ctx, x - sep, y, 1); ctx.restore();
  ctx.save(); ctx.beginPath(); ctx.rect(x + sep, y - 30, 60, 60); ctx.clip();
  drawSoul(ctx, x + sep, y, 1); ctx.restore();
  ctx.fillStyle = "#f4f2ec"; ctx.font = "20px monospace"; ctx.textAlign = "center";
  if (game.overT > 900) ctx.fillText("You came apart at the seams.", x, 250);
  if (game.overT > 1900) ctx.fillText("Gull Harbor will tidy them up.", x, 285);
  if (game.overT > 2700) { ctx.font = "14px monospace"; ctx.fillStyle = "#8a8a96"; ctx.fillText("PRESS Z", x, 340); }
  ctx.textAlign = "left";
}
function gameoverKey(k) {
  if ((k === "z" || k === "Enter") && game.overT > 1200) {
    game.hp = game.maxhp; game.moving = false;
    toTitle();
  }
}

/* ================= character creator ================= */
const pcv = $("cpreview"), pctx = pcv.getContext("2d");
const C = { sel: 0, rows: ["skin", "hair", "hcol", "shirt", "soul"], snapshot: null };
const OPTCOUNT = { skin: SKINS.length, hair: HAIRSTYLES.length, hcol: HAIRCOLS.length, shirt: SHIRTS.length, soul: SOULS.length };
const OPTLABEL = {
  skin: i => ["Fair", "Tan", "Brown", "Deep"][i],
  hair: i => HAIRSTYLES[i],
  hcol: i => HAIRCOLS[i][0],
  shirt: i => SHIRTS[i][0],
  soul: i => SOULS[i].name
};

function drawCreator() {
  pctx.fillStyle = "#101018"; pctx.fillRect(0, 0, pcv.width, pcv.height);
  drawPlayer(pctx, 20, 16, 12, "down", game.opts);
  drawSoul(pctx, 132, 176, 1, 2);
  document.querySelectorAll(".crow").forEach((row, i) => {
    const key = C.rows[i];
    row.querySelector(".val").textContent = "\u25c2 " + OPTLABEL[key](game.opts[key]) + " \u25b8";
    row.classList.toggle("sel", C.sel === i + 1);
  });
}
function creatorKey(k, e) {
  const input = $("cname");
  if (k === "ArrowUp") C.sel = Math.max(0, C.sel - 1);
  else if (k === "ArrowDown") C.sel = Math.min(5, C.sel + 1);
  else if ((k === "ArrowLeft" || k === "ArrowRight") && C.sel >= 1) {
    const key = C.rows[C.sel - 1], n = OPTCOUNT[key];
    game.opts[key] = (game.opts[key] + (k === "ArrowLeft" ? n - 1 : 1)) % n;
    SFX.move();
  } else if (k === "Enter") { confirmCreator(); return; }
  if (C.sel === 0) input.focus(); else { input.blur(); if (e) e.preventDefault(); }
  drawCreator();
}
$("cname").addEventListener("keydown", e => {
  /* remember the name you almost were */
  if (e.key === "Backspace" && $("cname").value.length >= 3) C.snapshot = $("cname").value;
  e.stopPropagation();
  if (e.key === "Enter") confirmCreator();
  if (e.key === "ArrowDown") { C.sel = 1; $("cname").blur(); drawCreator(); e.preventDefault(); }
});
function confirmCreator() {
  const v = $("cname").value.trim().toUpperCase();
  if (!v) { toast("› You need a name. Probably."); return; }
  if (v === "SIGNAL") { toast("› THAT NAME IS TAKEN."); $("cname").value = ""; SFX.hurt(); return; }
  game.name = v;
  if (v === "NOBODY") game.flags.namedNobody = true;
  if (C.snapshot && C.snapshot.trim().toUpperCase() !== v) game.almost = C.snapshot.trim().toUpperCase();
  $("creator").classList.remove("on");
  $("cname").blur();
  game.mode = "world";
  startDialog("intro");
}

/* ================= title & boot ================= */
$("titlepress").textContent = store.get("lowtide_save") ? "Z: continue \u00b7 N: new game" : "Press Z to begin";

function toTitle() {
  game.mode = "title";
  $("title").classList.add("on");
  $("titlepress").textContent = store.get("lowtide_save") ? "Z: continue \u00b7 N: new game" : "Press Z to begin";
}
function toCreator() {
  game.mode = "creator";
  $("creator").classList.add("on");
  drawCreator();
  setTimeout(() => $("cname").focus(), 50);
}
function titleKey(k) {
  if (k === "z" || k === "Enter") {
    SFX.sel();
    $("title").classList.remove("on");
    if (store.get("lowtide_save") && loadGame()) { game.mode = "world"; }
    else toCreator();
  } else if (k === "n") {
    SFX.sel();
    $("title").classList.remove("on");
    toCreator();
  }
}
/* the logo flickers, rarely, into something it shouldn't be */
setInterval(() => {
  if (game.mode !== "title") return;
  if (Math.random() < 0.18) {
    $("logotxt").textContent = "L0W T1DE";
    setTimeout(() => { $("logotxt").textContent = "LOW TIDE"; }, 90);
  }
}, 1400);

/* ================= input routing ================= */
function routeKey(k, e) {
  if (AC && AC.state === "suspended") AC.resume();
  if (game.mode === "title") titleKey(k);
  else if (game.mode === "creator") creatorKey(k, e);
  else if (game.mode === "dialog") dialogKey(k);
  else if (game.mode === "pause") pauseKey(k);
  else if (game.mode === "battle") battleKey(k);
  else if (game.mode === "gameover") gameoverKey(k);
  else if (game.mode === "world") {
    if (k === "z" || k === "Enter") interact();
    if (k === "Escape") openPause();
    if (k === "m") { sndOn = !sndOn; toast("› Sound " + (sndOn ? "on" : "off") + "."); }
  }
}
addEventListener("keydown", e => {
  if (e.target === $("cname")) return; /* the name field handles itself */
  const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
  if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault();
  keys[k] = true;
  routeKey(k, e);
});

/* ---------- mobile: translucent d-pad + A/B, feeding the same input paths ---------- */
const isTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
if (isTouch) $("mob").style.display = "block";
function bindHold(id, key) {
  const el = $(id);
  el.addEventListener("touchstart", e => { e.preventDefault(); keys[key] = true; routeKey(key); }, { passive: false });
  el.addEventListener("touchend", e => { e.preventDefault(); keys[key] = false; }, { passive: false });
  el.addEventListener("touchcancel", e => { e.preventDefault(); keys[key] = false; }, { passive: false });
}
bindHold("mUp", "ArrowUp"); bindHold("mDown", "ArrowDown");
bindHold("mLeft", "ArrowLeft"); bindHold("mRight", "ArrowRight");
bindHold("mA", "z"); bindHold("mB", "x"); bindHold("mMenu", "Escape");
addEventListener("keyup", e => {
  const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
  keys[k] = false;
});

/* ================= main loop ================= */
let last = performance.now();
function loop(now) {
  const dt = Math.min(50, now - last); last = now;
  game.t += dt;

  if (game.mode === "world" || game.mode === "dialog" || game.mode === "pause") {
    if (game.mode === "world") {
      if (game.moving) {
        game.prog += dt / 170; game.bobT += dt;
        if (game.prog >= 1) finishStep();
      } else {
        if (keys["ArrowLeft"] || keys["a"]) tryMove(-1, 0, "left");
        else if (keys["ArrowRight"] || keys["d"]) tryMove(1, 0, "right");
        else if (keys["ArrowUp"] || keys["w"]) tryMove(0, -1, "up");
        else if (keys["ArrowDown"] || keys["s"]) tryMove(0, 1, "down");
      }
    }
    renderWorld();
  } else if (game.mode === "battle") {
    renderBattle(dt);
  } else if (game.mode === "gameover") {
    renderGameOver(dt);
  } else {
    ctx.fillStyle = "#0a0a0f"; ctx.fillRect(0, 0, cv.width, cv.height);
  }

  if (game.mode === "dialog" || (game.mode === "battle" && D.typing)) advanceText(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
